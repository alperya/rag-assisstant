# Single container deployment (backend serves frontend static files)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-assistant
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - CHROMA_PERSIST_DIR=/data/chroma_data
      - UPLOAD_DIR=/data/uploads
    volumes:
      - rag_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rag_data:
