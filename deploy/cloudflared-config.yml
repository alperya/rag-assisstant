# Cloudflare Tunnel Configuration
# Replace <TUNNEL_ID> with your actual tunnel ID after running:
#   cloudflared tunnel create rag-assistant
#
# Copy this file to ~/.cloudflared/config.yml on your EC2 instance

tunnel: <TUNNEL_ID>
credentials-file: /home/ec2-user/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: rag.alperyasemin.com
    service: http://localhost:8000
  - service: http_status:404
