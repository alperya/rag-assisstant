services:
  - type: web
    name: rag-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Will prompt to set manually in Render dashboard
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_data
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CHUNK_SIZE
        value: "1500"
      - key: CHUNK_OVERLAP
        value: "300"
      - key: LLM_MODEL
        value: claude-sonnet-4-20250514
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
    disk:
      name: rag-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true
